<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>

  <title>Frontend Mentor | E-commerce product page</title>

</head>

<body>
  
  <header class="header">
    <div class="menu-icon">
      <img class="bars-icon" src="./images/icon-menu.svg" alt="Menu icon">
      <img class="logo" src="./images/logo.svg" alt="Sneaker Company Logo">
    </div>
    
    <nav class="menu">
        <img class="close-icon" src="./images/icon-close.svg" alt="close icon" width="16" height="15">
        <ul>
          <li><a href="#">Collections</a></li>
          <li><a href="#">Men</a></li>
          <li><a href="#">Women</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
      
      <div class="icon-cart">
        <div class="cart-container">
          <img class="cart" src="./images/icon-cart.svg" alt="icon for cart" width="20" height="20">
        </div>
        <img class="avatar" src="./images/image-avatar.png" alt="image for admin" width="24" height="24">
      </div>
      
    </header>
    
    <main class="app-container">
    <div class="image-container">
      
      <div class="product-image">
        <img class="img-hero" src="./images/image-product-1.jpg" alt="image of the product" width="375" height="375">
        <button class="prev-btn"><img src="./images/icon-previous.svg" alt="Previous image"></button>
        <button class="next-btn"><img src="./images/icon-next.svg" alt="Next image"></button>
      </div>
      
    </div>
    
    <div class="product-container">
      <div class="product-details">
        <h1>Sneaker Company</h1>
        <h2>Fall Limited Edition Sneakers</h2>
      </div>
      
      <div class="product-description">
        These low-profile sneakers are your perfect casual wear companion. Featuring a
        durable rubber outer sole, they’ll withstand everything the weather can offer.
      </div>
      
      <div class="product-price">
        <div class="current-price-container">
          <span class="current-price">$125.00</span>
          <span class="discount">50%</span>
        </div>
        <span class="original-price">$250.00</span>
      </div>

      <div class="add-to-cart-container">
        <div class="count-product">
          <button><img src="./images/icon-minus.svg" alt="Minus icon"></button>
          <span>0</span>
          <button><img src="./images/icon-plus.svg" alt="Plus icon"></button>
        </div>

        <button class="add-to-cart-btn">
          <img src="./images/icon-cart.svg" alt="icon for cart" width="16" height="20">
          Add to cart
        </button>
        
      </div>

    </div>

  </main>

</body>

</html>
